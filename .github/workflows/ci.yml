name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (SwiftPM)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftLint
        run: which swiftlint || brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict
